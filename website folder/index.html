<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mr P Beats | Premium Instrumentals</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#081a3a,#0f2e6e,#153d8a);
color:white;
min-height:100vh;
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.logo{
font-size:24px;
font-weight:600;
color:#4cc9ff;
}

nav a{
margin-left:25px;
text-decoration:none;
color:white;
font-weight:500;
}

nav a:hover{
color:#4cc9ff;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
opacity:.8;
margin-bottom:30px;
}

.hero button{
padding:15px 35px;
background:#4cc9ff;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
transition:.3s;
}

.hero button:hover{
transform:scale(1.05);
}

/* SEARCH */

.search-bar{
text-align:center;
margin:40px 0;
}

.search-bar input{
padding:12px;
width:300px;
border-radius:6px;
border:none;
}

/* BEATS GRID */

.container{
width:85%;
margin:auto;
}

.beats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.beat-card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
transition:.3s;
}

.beat-card:hover{
transform:translateY(-8px);
background:rgba(255,255,255,0.08);
}

.beat-card h3{
margin-bottom:8px;
}

.beat-card p{
font-size:14px;
opacity:.7;
margin-bottom:10px;
}

audio{
width:100%;
margin-bottom:10px;
}

.buy-btn{
background:#4cc9ff;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

/* CART */

.cart{
position:fixed;
right:20px;
bottom:20px;
background:#4cc9ff;
padding:15px 20px;
border-radius:10px;
color:black;
font-weight:600;
cursor:pointer;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
margin-top:80px;
opacity:.6;
}

</style>
</head>

<body>

<header>

<div class="logo">Mr P Beats</div>

<nav>
<a href="#">Home</a>
<a href="#beats">Beats</a>
<a href="#contact">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Premium Beats Marketplace</h1>

<p>Listen to high quality instrumentals and buy the perfect beat</p>

<button onclick="document.getElementById('beats').scrollIntoView()">Browse Beats</button>

</section>

<div class="search-bar">
<input type="text" id="search" placeholder="Search beats...">
</div>

<section id="beats" class="container">

<div class="beats-grid" id="beatList">

<div class="beat-card" data-name="trap energy">

<h3>Trap Energy</h3>
<p>Trap • 140 BPM</p>

<audio controls>
<source src="beat1.mp3" type="audio/mpeg">
</audio>

<button class="buy-btn" onclick="addToCart('Trap Energy',29)">Buy $29</button>

</div>

<div class="beat-card" data-name="chill vibes">

<h3>Chill Vibes</h3>
<p>LoFi • 90 BPM</p>

<audio controls>
<source src="beat2.mp3" type="audio/mpeg">
</audio>

<button class="buy-btn" onclick="addToCart('Chill Vibes',25)">Buy $25</button>

</div>

<div class="beat-card" data-name="afro bounce">

<h3>Afro Bounce</h3>
<p>Afrobeats • 105 BPM</p>

<audio controls>
<source src="beat3.mp3" type="audio/mpeg">
</audio>

<button class="buy-btn" onclick="addToCart('Afro Bounce',30)">Buy $30</button>

</div>

</div>

</section>

<div class="cart" onclick="viewCart()">
🛒 Cart (<span id="cartCount">0</span>)
</div>

<footer id="contact">

<p>© 2026 Mr P Beats</p>
<p>Email: mrpbeats@email.com</p>

</footer>

<script>

let cart=[]
let cartCount=0

function addToCart(name,price){

cart.push({name,price})
cartCount++

document.getElementById("cartCount").innerText=cartCount

alert(name+" added to cart")

}

function viewCart(){

let total=0
let items=""

cart.forEach(item=>{
items+=item.name+" - $"+item.price+"\n"
total+=item.price
})

alert("Your Cart:\n\n"+items+"\nTotal: $"+total)

}

/* SEARCH FUNCTION */

document.getElementById("search").addEventListener("keyup",function(){

let filter=this.value.toLowerCase()
let beats=document.querySelectorAll(".beat-card")

beats.forEach(card=>{
let name=card.getAttribute("data-name")

if(name.includes(filter)){
card.style.display="block"
}else{
card.style.display="none"
}

})

})

</script>

</body>
</html>
